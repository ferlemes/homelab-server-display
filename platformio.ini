; PlatformIO — ESP32-C3 Super Mini + OLED I2C (NFP1315 / SSD1306-SSD1315)
; Build:    ~/.pio-venv/bin/pio run
; Upload:   ~/.pio-venv/bin/pio run -t upload
; Monitor:  ~/.pio-venv/bin/pio device monitor

[env:esp32-c3-supermini]
platform  = espressif32
board     = esp32-c3-devkitm-1
framework = arduino

; O ESP32-C3 Super Mini usa USB nativo (USB Serial/JTAG) -> /dev/ttyACM0.
; As flags abaixo fazem o Serial.print() sair pela USB.
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

monitor_speed   = 115200
monitor_filters = esp32_exception_decoder

lib_deps =
    olikraus/U8g2 @ ^2.34.22
